<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Obat Habis</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #f4f6f8; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 480px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1e293b; margin-top: 0; margin-bottom: 20px; }
        .input-box { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; outline: none; }
        input:focus { border-color: #2563eb; }
        button.add-btn { background: #2563eb; color: white; border: none; padding: 12px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        button.add-btn:hover { background: #1d4ed8; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .obat-info { display: flex; flex-direction: column; gap: 4px; }
        .nama-obat { font-weight: 600; color: #0f172a; font-size: 15px; }
        .tanggal { font-size: 12px; color: #64748b; }
        button.del-btn { background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; }
        button.del-btn:hover { background: #dc2626; }
        .empty { text-align: center; color: #94a3b8; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>💊 Daftar Obat Habis</h2>
    <div class="input-box">
        <input type="text" id="obatInput" placeholder="Ketik nama obat..." onkeypress="if(event.key==='Enter') tambahObat()">
        <button class="add-btn" onclick="tambahObat()">Tambah</button>
    </div>
    <ul id="daftarObat"></ul>
    <p id="pesanKosong" class="empty">Semua stok aman! Tidak ada obat habis.</p>
</div>

<script>
    let obatList = JSON.parse(localStorage.getItem('obatHabis')) || [];

    function renderList() {
        const ul = document.getElementById('daftarObat');
        const pesan = document.getElementById('pesanKosong');
        ul.innerHTML = '';
        
        if (obatList.length === 0) {
            pesan.style.display = 'block';
        } else {
            pesan.style.display = 'none';
            obatList.forEach((item, index) => {
                ul.innerHTML += `
                    <li>
                        <div class="obat-info">
                            <span class="nama-obat">${item.nama}</span>
                            <span class="tanggal">🕒 Diminta: ${item.tanggal}</span>
                        </div>
                        <button class="del-btn" onclick="hapusObat(${index})">Sudah Ada / Hapus</button>
                    </li>
                `;
            });
        }
        localStorage.setItem('obatHabis', JSON.stringify(obatList));
    }

    function tambahObat() {
        const input = document.getElementById('obatInput');
        const nama = input.value.trim();
        
        if (nama) {
            // Format tanggal & jam lokal (contoh: 24 Jul 2026, 14:30)
            const sekarang = new Date();
            const opsiTanggal = { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            const tanggalFormatted = sekarang.toLocaleDateString('id-ID', opsiTanggal).replace('.', ':');

            // Simpan sebagai object berisi nama dan tanggal
            obatList.push({
                nama: nama,
                tanggal: tanggalFormatted
            });

            input.value = '';
            renderList();
        }
    }

    function hapusObat(index) {
        obatList.splice(index, 1);
        renderList();
    }

    renderList();
</script>

</body>
</html>
